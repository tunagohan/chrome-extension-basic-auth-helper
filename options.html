<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>Basic Auth Helper Settings</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 1100px;
        margin: 24px auto;
        padding: 0 16px;
      }

      h1 {
        font-size: 24px;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr 2.4fr auto auto;
        gap: 8px;
        margin-bottom: 8px;
        align-items: center;
      }

      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 8px;
        box-sizing: border-box;
      }

      button {
        padding: 8px 12px;
        cursor: pointer;
      }

      .header {
        font-weight: bold;
        margin-top: 16px;
      }

      .mono {
        font-family: monospace;
      }

      #message {
        margin: 12px 0;
        color: green;
        min-height: 1.2em;
      }

      .toolbar {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 16px;
        margin-bottom: 12px;
      }

      .section {
        margin-top: 24px;
      }

      textarea {
        width: 100%;
        min-height: 220px;
        box-sizing: border-box;
        padding: 12px;
        font-family: monospace;
        font-size: 13px;
      }

      .help {
        color: #555;
        font-size: 13px;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <h1>Basic Auth Helper</h1>

    <p>
      URLごとに <span class="mono">id / password / 正規表現</span> を登録します。
    </p>

    <div class="row header">
      <div>ID</div>
      <div>Password</div>
      <div>URL Regex</div>
      <div>Enabled</div>
      <div>Action</div>
    </div>

    <div id="rules"></div>

    <div class="toolbar">
      <button id="addRule">行を追加</button>
      <button id="save">保存</button>
      <button id="exportRules">Export JSON</button>
      <button id="copyExportedJson">Export内容をコピー</button>
      <button id="importRules">Import JSONを反映</button>
      <button id="downloadRules">JSONをダウンロード</button>
      <button id="loadFileButton">JSONファイルを読み込む</button>
      <input id="importFile" type="file" accept="application/json,.json" style="display: none;" />
    </div>

    <div id="message"></div>

    <div class="section">
      <h2>Export / Import</h2>
      <textarea
        id="jsonArea"
        placeholder="ここにExport結果が表示されます。Importしたい場合はここにJSONを貼り付けてください。"
      ></textarea>
      <div class="help">
        JSON形式:
        <span class="mono">[{ "id": "...", "password": "...", "urlPattern": "...", "enabled": true }]</span>
      </div>
    </div>

    <script src="options.js"></script>
  </body>
</html>
