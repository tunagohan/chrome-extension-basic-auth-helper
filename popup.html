<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>Basic Auth Helper</title>
    <style>
      body {
        font-family: sans-serif;
        width: 360px;
        margin: 0;
        padding: 16px;
        box-sizing: border-box;
      }

      h1 {
        font-size: 18px;
        margin: 0 0 12px;
      }

      .summary {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 16px;
      }

      .card {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 10px;
        background: #fafafa;
      }

      .label {
        font-size: 12px;
        color: #666;
        margin-bottom: 4px;
      }

      .value {
        font-size: 20px;
        font-weight: bold;
      }

      .toolbar {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }

      button {
        padding: 8px 12px;
        cursor: pointer;
      }

      .list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-height: 360px;
        overflow-y: auto;
      }

      .rule {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 10px;
      }

      .rule-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }

      .rule-id {
        font-weight: bold;
        word-break: break-all;
      }

      .badge {
        font-size: 12px;
        border-radius: 999px;
        padding: 2px 8px;
        white-space: nowrap;
      }

      .badge.enabled {
        background: #e7f7eb;
        color: #187a39;
      }

      .badge.disabled {
        background: #f5f5f5;
        color: #666;
      }

      .urls {
        font-size: 12px;
        color: #444;
        line-height: 1.5;
        word-break: break-all;
      }

      .url-item {
        padding-left: 2px;
      }

      .empty {
        color: #666;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <h1>Basic Auth Helper</h1>

    <div class="summary">
      <div class="card">
        <div class="label">登録ルール数</div>
        <div class="value" id="totalCount">0</div>
      </div>
      <div class="card">
        <div class="label">有効ルール数</div>
        <div class="value" id="enabledCount">0</div>
      </div>
    </div>

    <div class="toolbar">
      <button id="openOptions" type="button">Optionsを開く</button>
      <button id="reload" type="button">再読込</button>
    </div>

    <div id="ruleList" class="list"></div>

    <script src="popup.js"></script>
  </body>
</html>
